<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AI Chat</title>
<style>
*{
  box-sizing:border-box;
}
body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#343541;
  color:#ececf1;
  height:100vh;
  display:flex;
  flex-direction:column;
}
header{
  background:#202123;
  padding:16px 20px;
  font-size:18px;
  font-weight:600;
  border-bottom:1px solid #444654;
}
#chat{
  flex:1;
  overflow-y:auto;
  padding:24px 0;
}
.row{
  width:100%;
  display:flex;
  padding:18px 0;
}
.row.user{
  background:#343541;
  justify-content:flex-end;
}
.row.bot{
  background:#444654;
  justify-content:flex-start;
}
.bubble{
  max-width:800px;
  width:calc(100% - 40px);
  margin:0 20px;
  line-height:1.6;
  white-space:pre-wrap;
  word-break:break-word;
}
.label{
  font-size:12px;
  opacity:0.7;
  margin-bottom:6px;
}
.text{
  font-size:16px;
}
#inputArea{
  background:#343541;
  border-top:1px solid #444654;
  padding:16px;
}
.input-wrap{
  max-width:900px;
  margin:0 auto;
  display:flex;
  gap:10px;
}
#message{
  flex:1;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid #565869;
  background:#40414f;
  color:#ececf1;
  font-size:16px;
  outline:none;
}
#message::placeholder{
  color:#a9a9b3;
}
button{
  padding:0 20px;
  border:none;
  border-radius:12px;
  background:#19c37d;
  color:white;
  font-size:15px;
  cursor:pointer;
}
button:hover{
  opacity:0.92;
}
button:disabled{
  opacity:0.5;
  cursor:not-allowed;
}
.top-actions{
  max-width:900px;
  margin:0 auto 10px auto;
  display:flex;
  justify-content:flex-end;
}
.clear-btn{
  background:#565869;
  padding:8px 14px;
  border-radius:10px;
  font-size:13px;
}
.thinking{
  opacity:0.8;
  font-style:italic;
}
@media (max-width: 700px){
  .bubble{
    width:calc(100% - 24px);
    margin:0 12px;
  }
  #inputArea{
    padding:12px;
  }
}
</style>
</head>
<body>

<header>My GPT Chat</header>

<div id="chat"></div>

<div id="inputArea">
  <div class="top-actions">
    <button class="clear-btn" onclick="clearChat()">Clear chat</button>
  </div>
  <div class="input-wrap">
    <input id="message" placeholder="Type a message and press Enter..." />
    <button id="sendBtn" onclick="send()">Send</button>
  </div>
</div>

<script>
const chat = document.getElementById("chat");
const input = document.getElementById("message");
const sendBtn = document.getElementById("sendBtn");
const STORAGE_KEY = "my_ai_chat_history";

function saveMessages() {
  localStorage.setItem(STORAGE_KEY, chat.innerHTML);
}

function loadMessages() {
  const saved = localStorage.getItem(STORAGE_KEY);
  if (saved) {
    chat.innerHTML = saved;
    chat.scrollTop = chat.scrollHeight;
  } else {
    addMessage("Hi! Ask me anything.", "bot");
  }
}

function addMessage(text, type, extraClass = "") {
  const row = document.createElement("div");
  row.className = "row " + type;

  const bubble = document.createElement("div");
  bubble.className = "bubble";

  const label = document.createElement("div");
  label.className = "label";
  label.innerText = type === "user" ? "You" : "GPT";

  const textDiv = document.createElement("div");
  textDiv.className = "text " + extraClass;
  textDiv.innerText = text;

  bubble.appendChild(label);
  bubble.appendChild(textDiv);
  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop = chat.scrollHeight;
  saveMessages();
  return textDiv;
}

function clearChat() {
  localStorage.removeItem(STORAGE_KEY);
  chat.innerHTML = "";
  addMessage("Hi! Ask me anything.", "bot");
}

async function send() {
  const message = input.value.trim();
  if (!message) return;

  addMessage(message, "user");
  input.value = "";
  input.focus();

  sendBtn.disabled = true;
  input.disabled = true;

  const thinkingNode = addMessage("GPT is thinking...", "bot", "thinking");

  try {
    const res = await fetch("http://127.0.0.1:8000/chat", {
      method: "POST",
      headers: {
        "Content-Type": "application/json"
      },
      body: JSON.stringify({ message: message })
    });

    const data = await res.json();

    if (data.reply) {
      thinkingNode.innerText = data.reply;
      thinkingNode.classList.remove("thinking");
    } else if (data.error) {
      thinkingNode.innerText = "Error: " + data.error;
      thinkingNode.classList.remove("thinking");
    } else {
      thinkingNode.innerText = "Error: unexpected response";
      thinkingNode.classList.remove("thinking");
    }
  } catch (err) {
    thinkingNode.innerText = "Fetch error: " + err.message;
    thinkingNode.classList.remove("thinking");
    console.error(err);
  }

  saveMessages();
  chat.scrollTop = chat.scrollHeight;
  sendBtn.disabled = false;
  input.disabled = false;
  input.focus();
}

input.addEventListener("keydown", function(e) {
  if (e.key === "Enter") {
    send();
  }
});

loadMessages();
</script>

</body>
</html>
