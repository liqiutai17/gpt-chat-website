<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>My AI Chat</title>

<style>

*{
  box-sizing:border-box;
}

body{
  margin:0;
  font-family:Arial, sans-serif;
  background:#343541;
  color:#ececf1;
  height:100vh;
  display:flex;
  flex-direction:column;
}

header{
  background:#202123;
  padding:16px 20px;
  font-size:18px;
  font-weight:600;
  border-bottom:1px solid #444654;
}

#chat{
  flex:1;
  overflow-y:auto;
  padding:24px 0;
}

.row{
  width:100%;
  display:flex;
  padding:18px 0;
}

.row.user{
  background:#343541;
  justify-content:flex-end;
}

.row.bot{
  background:#444654;
  justify-content:flex-start;
}

.bubble{
  max-width:800px;
  width:calc(100% - 40px);
  margin:0 20px;
  line-height:1.6;
  white-space:pre-wrap;
}

.label{
  font-size:12px;
  opacity:0.7;
  margin-bottom:6px;
}

.text{
  font-size:16px;
}

#inputArea{
  background:#343541;
  border-top:1px solid #444654;
  padding:16px;
}

.input-wrap{
  max-width:900px;
  margin:0 auto;
  display:flex;
  gap:10px;
}

#message{
  flex:1;
  padding:14px 16px;
  border-radius:12px;
  border:1px solid #565869;
  background:#40414f;
  color:#ececf1;
  font-size:16px;
}

button{
  padding:0 20px;
  border:none;
  border-radius:12px;
  background:#19c37d;
  color:white;
  font-size:15px;
  cursor:pointer;
}

button:hover{
  opacity:0.9;
}

.thinking{
  opacity:0.7;
  font-style:italic;
}

</style>
</head>

<body>

<header>My GPT Chat</header>

<div id="chat"></div>

<div id="inputArea">
  <div class="input-wrap">
    <input id="message" placeholder="Type message..." />
    <button id="sendBtn">Send</button>
  </div>
</div>

<script>

const chat = document.getElementById("chat");
const input = document.getElementById("message");
const sendBtn = document.getElementById("sendBtn");

function addMessage(text,type){

  const row = document.createElement("div");
  row.className="row "+type;

  const bubble = document.createElement("div");
  bubble.className="bubble";

  const label=document.createElement("div");
  label.className="label";
  label.innerText = type==="user"?"You":"GPT";

  const msg=document.createElement("div");
  msg.className="text";
  msg.innerText=text;

  bubble.appendChild(label);
  bubble.appendChild(msg);

  row.appendChild(bubble);
  chat.appendChild(row);

  chat.scrollTop=chat.scrollHeight;

  return msg;
}

async function send(){

  const message=input.value.trim();
  if(!message) return;

  addMessage(message,"user");
  input.value="";

  const thinking=addMessage("GPT is thinking...","bot");
  thinking.classList.add("thinking");

  try{

    const res = await fetch("https://gpt-chat-backend-3v9v.onrender.com/chat",{
      method:"POST",
      headers:{
        "Content-Type":"application/json"
      },
      body:JSON.stringify({message:message})
    });

    const data = await res.json();

    thinking.classList.remove("thinking");

    if(data.reply){
      thinking.innerText=data.reply;
    }else{
      thinking.innerText="Error: "+JSON.stringify(data);
    }

  }catch(err){

    thinking.classList.remove("thinking");
    thinking.innerText="Connection error";
    console.error(err);

  }

}

sendBtn.onclick=send;

input.addEventListener("keydown",function(e){
  if(e.key==="Enter"){
    send();
  }
});

addMessage("Hi! Ask me anything.","bot");

</script>

</body>
</html>
